<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chat - Ethiobet</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#0b0e14; color:#fff; min-height:100vh; display:flex; justify-content:center; padding:0; margin:0; overflow-x:hidden; }
    .app { max-width:480px; width:100%; background:#0b0e14; padding:12px 16px 20px; min-height:100vh; display:flex; flex-direction:column; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:12px; }
    .header .back { background:none; border:none; color:#6a7e9c; font-size:14px; cursor:pointer; }
    .header .balance { color:#ffd966; font-weight:700; background:rgba(240,185,11,0.12); padding:2px 12px; border-radius:40px; border:1px solid rgba(240,185,11,0.2); font-size:13px; }
    .chat-box { flex:1; overflow-y:auto; padding:8px 0; display:flex; flex-direction:column; gap:4px; max-height:70vh; }
    .msg { background:#1a1f2b; padding:6px 12px; border-radius:8px; border:1px solid #2a3546; max-width:85%; word-break:break-word; }
    .msg .user { color:#f0b90b; font-weight:600; font-size:12px; }
    .msg .text { color:#e0e6ed; font-size:14px; }
    .msg .time { color:#6a7e9c; font-size:10px; text-align:right; margin-top:2px; }
    .msg.self { align-self:flex-end; background:#2a3546; border-color:#3a4a5e; }
    .input-area { display:flex; gap:8px; padding:8px 0; border-top:1px solid rgba(255,255,255,0.05); }
    .input-area input { flex:1; padding:10px 14px; background:#1b2532; border:1px solid #2f3e51; border-radius:40px; color:#fff; font-size:14px; outline:none; }
    .input-area button { padding:10px 20px; border:none; border-radius:40px; font-weight:700; background:linear-gradient(135deg,#f0b90b,#d99f0a); color:#0b0e14; cursor:pointer; }
    .input-area button:active { transform:scale(0.95); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back" onclick="history.back()">← Back</button>
    <span class="balance" id="balanceDisplay">💰 0.00 ETB</span>
  </div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input id="msgInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>
<script>
  const BACKEND_URL = (() => {
    const host = window.location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return 'http://localhost:8080';
    return 'https://ethio-bet-1.onrender.com';
  })();

  function getToken() { return localStorage.getItem('token'); }
  let currentUser = null;

  async function fetchProfile() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${BACKEND_URL}/api/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        currentUser = data;
        document.getElementById('balanceDisplay').textContent = `💰 ${data.balance.toFixed(2)} ETB`;
      }
    } catch (e) {}
  }

  function loadMessages() {
    const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
    const box = document.getElementById('chatBox');
    box.innerHTML = messages.map(m => `
      <div class="msg ${m.userId === currentUser?.id ? 'self' : ''}">
        <div class="user">${m.name || 'User'}</div>
        <div class="text">${m.text}</div>
        <div class="time">${new Date(m.time).toLocaleTimeString()}</div>
      </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentUser) return;
    const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
    messages.push({
      userId: currentUser.id,
      name: currentUser.name || 'User',
      text,
      time: Date.now()
    });
    localStorage.setItem('chatMessages', JSON.stringify(messages));
    input.value = '';
    loadMessages();
  }

  fetchProfile().then(() => {
    loadMessages();
    // Simulate receiving messages every 5s (demo)
    setInterval(() => {
      const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
      if (messages.length > 0) loadMessages();
    }, 5000);
  });
</script>
</body>
</html>
