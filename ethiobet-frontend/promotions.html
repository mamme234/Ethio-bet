<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎁 Promotions</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #0b0e14; color: #fff; min-height: 100vh; display: flex; justify-content: center; padding: 0; margin: 0; }
    .app { max-width: 480px; width: 100%; background: #0b0e14; padding: 6px 12px 20px; min-height: 100vh; }
    .back-btn { background: none; border: none; color: #6a7e9c; font-size: 13px; cursor: pointer; padding: 4px 0; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .back-btn:active { transform: scale(0.95); }
    .promo-card { background: linear-gradient(135deg, #1f3a2f, #2a8c5a); border-radius: 14px; padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .promo-card .text { font-weight: 700; font-size: 14px; }
    .promo-card .text small { display: block; font-weight: 400; font-size: 11px; opacity: 0.8; }
    .promo-card .btn { background: #f0b90b; color: #0b0e14; padding: 4px 14px; border-radius: 40px; font-weight: 700; font-size: 12px; border: none; cursor: pointer; }
    .promo-card .btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div class="app">
  <button class="back-btn" onclick="location.href='index.html'">← Back to Lobby</button>
  <h2 style="margin-bottom:10px;font-size:18px;">🎁 Promotions</h2>
  <div class="promo-card">
    <div class="text">💰 Deposit Bonus <small>100% up to 1000 ETB</small></div>
    <button class="btn" onclick="alert('Claim bonus!')">Claim</button>
  </div>
  <div class="promo-card">
    <div class="text">🎰 Spin Bonuses <small>Free spins on selected slots</small></div>
    <button class="btn" onclick="alert('Claim bonus!')">Claim</button>
  </div>
  <div class="promo-card">
    <div class="text">🐔 Shamo <small>Weekly cashback bonus</small></div>
    <button class="btn" onclick="alert('Claim bonus!')">Claim</button>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }
  console.log('🎁 Promotions Loaded');
</script>
</body>
</html>
