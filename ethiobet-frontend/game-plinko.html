<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Plinko - Ethiobet</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#0b0e14; color:#fff; min-height:100vh; display:flex; justify-content:center; padding:0; margin:0; overflow-x:hidden; }
    .app { max-width:480px; width:100%; background:#0b0e14; padding:12px 16px 20px; min-height:100vh; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:12px; }
    .header .back { background:none; border:none; color:#6a7e9c; font-size:14px; cursor:pointer; }
    .header .balance { color:#ffd966; font-weight:700; background:rgba(240,185,11,0.12); padding:2px 12px; border-radius:40px; border:1px solid rgba(240,185,11,0.2); font-size:13px; }
    .plinko-board { position:relative; width:100%; height:400px; background:#1a1f2b; border-radius:16px; border:1px solid #2a3546; overflow:hidden; }
    .ball { position:absolute; width:20px; height:20px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #f0b90b, #d99f0a); box-shadow:0 0 20px rgba(240,185,11,0.3); transition:all 0.1s linear; }
    .controls { display:flex; gap:8px; margin-top:12px; }
    .controls button { padding:10px 20px; border:none; border-radius:40px; font-weight:700; cursor:pointer; transition:0.15s; flex:1; }
    .controls button:active { transform:scale(0.95); }
    .btn-drop { background:linear-gradient(135deg,#f0b90b,#d99f0a); color:#0b0e14; }
    .result { text-align:center; margin-top:8px; font-weight:700; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back" onclick="history.back()">← Back</button>
    <span class="balance" id="balanceDisplay">💰 0.00 ETB</span>
  </div>
  <div style="font-size:18px;font-weight:700;">🟡 Plinko</div>
  <div class="plinko-board" id="plinkoBoard"></div>
  <div class="controls">
    <button class="btn-drop" onclick="dropBall()">Drop Ball</button>
  </div>
  <div class="result" id="plinkoResult">Drop a ball!</div>
</div>
<script>
  const BACKEND_URL = (() => {
    const host = window.location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return 'http://localhost:8080';
    return 'https://ethio-bet-1.onrender.com';
  })();

  function getToken() { return localStorage.getItem('token'); }
  let balance = 0;

  async function fetchBalance() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${BACKEND_URL}/api/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        balance = data.balance;
        document.getElementById('balanceDisplay').textContent = `💰 ${balance.toFixed(2)} ETB`;
      }
    } catch (e) {}
  }

  function dropBall() {
    const board = document.getElementById('plinkoBoard');
    const ball = document.createElement('div');
    ball.className = 'ball';
    const startX = Math.random() * (board.clientWidth - 20);
    ball.style.left = startX + 'px';
    ball.style.top = '0px';
    board.appendChild(ball);

    let y = 0;
    const interval = setInterval(() => {
      y += 5;
      if (y >= board.clientHeight - 30) {
        clearInterval(interval);
        // Determine multiplier based on landing position (simplified)
        const x = parseFloat(ball.style.left);
        const multiplier = Math.max(0.2, Math.min(2.0, x / board.clientWidth * 2));
        const win = 10 * multiplier;
        balance += win;
        document.getElementById('balanceDisplay').textContent = `💰 ${balance.toFixed(2)} ETB`;
        document.getElementById('plinkoResult').textContent = `🎉 Landed at ${multiplier.toFixed(2)}x! Win ${win.toFixed(2)} ETB`;
        setTimeout(() => ball.remove(), 1500);
        return;
      }
      // Random horizontal drift
      const drift = (Math.random() - 0.5) * 6;
      let left = parseFloat(ball.style.left) + drift;
      left = Math.max(0, Math.min(board.clientWidth - 20, left));
      ball.style.left = left + 'px';
      ball.style.top = y + 'px';
    }, 30);
  }

  fetchBalance();
</script>
</body>
</html>
