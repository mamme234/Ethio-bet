<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Aviator - Ethiobet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#0b0e14; color:#fff; min-height:100vh; display:flex; justify-content:center; padding:0; margin:0; overflow-x:hidden; user-select:none; }
    .app { max-width:480px; width:100%; background:#0b0e14; padding:12px 16px 20px; min-height:100vh; display:flex; flex-direction:column; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:12px; }
    .header .back { background:none; border:none; color:#6a7e9c; font-size:14px; cursor:pointer; padding:4px 8px; }
    .header .back:active { transform:scale(0.9); }
    .header .balance { color:#ffd966; font-weight:700; background:rgba(240,185,11,0.12); padding:2px 12px; border-radius:40px; border:1px solid rgba(240,185,11,0.2); font-size:13px; }
    .game-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; margin:10px 0; background:linear-gradient(145deg,#131a22,#1a1f2b); border-radius:20px; padding:20px 16px; min-height:320px; border:1px solid rgba(255,255,255,0.04); }
    .multiplier { font-size:72px; font-weight:900; color:#f0b90b; text-shadow:0 0 60px rgba(240,185,11,0.15); transition:color 0.15s ease; will-change:transform; }
    .multiplier.crashed { color:#ff6b6b; text-shadow:0 0 60px rgba(255,107,107,0.25); }
    .status-text { font-size:14px; color:#6a7e9c; margin-top:6px; min-height:22px; }
    .connection-status { font-size:11px; text-align:center; margin-top:4px; min-height:18px; }
    .connection-status.connected { color:#2a8c5a; }
    .connection-status.disconnected { color:#ff6b6b; }
    .controls { display:flex; gap:10px; margin-top:16px; width:100%; max-width:320px; }
    .controls input { flex:1; padding:10px 14px; background:#1b2532; border:1px solid #2f3e51; border-radius:40px; color:#fff; font-size:14px; outline:none; min-width:0; }
    .controls input:focus { border-color:#f0b90b; }
    .controls button { padding:10px 18px; border:none; border-radius:40px; font-weight:700; font-size:14px; cursor:pointer; transition:0.15s; flex:1; min-width:70px; }
    .controls button:active { transform:scale(0.94); }
    .controls button:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
    .btn-bet { background:linear-gradient(135deg,#f0b90b,#d99f0a); color:#0b0e14; box-shadow:0 4px 20px rgba(240,185,11,0.15); }
    .btn-cashout { background:#2a8c5a; color:#fff; }
    .history { margin-top:16px; color:#6a7e9c; font-size:12px; text-align:center; width:100%; border-top:1px solid rgba(255,255,255,0.04); padding-top:10px; max-height:70px; overflow-y:auto; display:flex; flex-wrap:wrap; justify-content:center; gap:4px; }
    .history .crash-point { display:inline-block; background:#1a1f2b; padding:2px 10px; border-radius:40px; font-weight:600; color:#f0b90b; font-size:11px; }
    .history .crash-point.low { color:#6a7e9c; }
    .history .crash-point.medium { color:#f0b90b; }
    .history .crash-point.high { color:#ff6b6b; }
    .bet-amount { color:#889bb5; font-size:12px; margin-top:4px; }
    .win-amount { color:#ffd966; font-size:14px; font-weight:700; margin-top:2px; }
    .profit-badge { display:inline-block; background:rgba(42,140,90,0.2); color:#2a8c5a; padding:0 10px; border-radius:40px; font-size:12px; font-weight:600; margin-top:2px; }
    .profit-badge.loss { background:rgba(255,107,107,0.15); color:#ff6b6b; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back" onclick="history.back()">← Back</button>
    <span class="balance" id="balanceDisplay">💰 0.00 ETB</span>
  </div>
  <div class="game-area">
    <div class="multiplier" id="multiplierDisplay">1.00x</div>
    <div class="status-text" id="statusText">Waiting for next round...</div>
    <div class="connection-status connected" id="connectionStatus">● Connected</div>
    <div class="controls">
      <input type="number" id="betAmount" placeholder="Bet" value="1" min="0.1" step="0.1" />
      <button class="btn-bet" id="betBtn" onclick="placeBet()">BET</button>
      <button class="btn-cashout" id="cashoutBtn" onclick="cashOut()" disabled>CASH OUT</button>
    </div>
    <div id="betInfo">
      <div class="bet-amount" id="betDisplay"></div>
      <div class="win-amount" id="winDisplay"></div>
    </div>
    <div class="history" id="historyContainer">
      <span style="color:#4a5e7a;width:100%;font-size:11px;">History will appear here</span>
    </div>
  </div>
</div>
<script>
  // ===== CONFIG =====
  function getBackendUrl() {
    const host = window.location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return 'http://localhost:8080';
    return 'https://ethio-bet-1.onrender.com';
  }
  const WS_URL = getBackendUrl().replace('http', 'ws');
  const API_URL = getBackendUrl();

  // ===== USER =====
  function getToken() { return localStorage.getItem('token'); }
  let currentBalance = 0;
  let userId = null;

  async function fetchBalance() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${API_URL}/api/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        currentBalance = data.balance;
        userId = data.id;
        document.getElementById('balanceDisplay').textContent = `💰 ${currentBalance.toFixed(2)} ETB`;
      }
    } catch (e) { console.error('Balance fetch error', e); }
  }

  // ===== WEBSOCKET =====
  let ws = null;
  let reconnectTimer = null;
  let isConnected = false;

  let roundState = {
    status: 'waiting',   // 'waiting', 'flying', 'crashed'
    multiplier: 1.00,
    crashPoint: 0,
    canBet: true,
    canCashout: false,
    myBet: null,
    myBetPlaced: false,
    hasCashedOut: false,
  };

  const multiplierEl = document.getElementById('multiplierDisplay');
  const statusText = document.getElementById('statusText');
  const connectionStatus = document.getElementById('connectionStatus');
  const betBtn = document.getElementById('betBtn');
  const cashoutBtn = document.getElementById('cashoutBtn');
  const betInput = document.getElementById('betAmount');
  const betDisplay = document.getElementById('betDisplay');
  const winDisplay = document.getElementById('winDisplay');
  const historyContainer = document.getElementById('historyContainer');
  let history = [];

  function connectWebSocket() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
    const token = getToken();
    if (!token) {
      setConnectionStatus('disconnected', '⚠️ Please login first');
      return;
    }
    if (!userId) {
      fetchBalance().then(() => { if (userId) connectWebSocket(); });
      return;
    }

    ws = new WebSocket(`${WS_URL}?userId=${userId}`);
    ws.onopen = () => {
      isConnected = true;
      setConnectionStatus('connected', '● Connected');
      updateUI();
    };
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        handleSocketMessage(data);
      } catch (err) { console.error('Parse error', err); }
    };
    ws.onclose = () => {
      isConnected = false;
      setConnectionStatus('disconnected', '● Disconnected. Reconnecting...');
      betBtn.disabled = true;
      cashoutBtn.disabled = true;
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        if (!isConnected) connectWebSocket();
      }, 3000);
    };
    ws.onerror = (err) => console.error('WebSocket error', err);
  }

  function handleSocketMessage(data) {
    switch (data.type) {
      case 'init':
        userId = data.userId;
        currentBalance = data.balance || 0;
        document.getElementById('balanceDisplay').textContent = `💰 ${currentBalance.toFixed(2)} ETB`;
        break;
      case 'round_started':
        roundState.status = 'flying';
        roundState.multiplier = 1.00;
        roundState.myBetPlaced = false;
        roundState.hasCashedOut = false;
        roundState.canBet = true;
        roundState.canCashout = false;
        betDisplay.textContent = '';
        winDisplay.textContent = '';
        updateUI();
        break;
      case 'multiplier_update':
        if (roundState.status === 'flying') {
          roundState.multiplier = data.multiplier;
          multiplierEl.textContent = data.multiplier.toFixed(2) + 'x';
          if (roundState.myBetPlaced && !roundState.hasCashedOut) {
            roundState.canCashout = true;
            cashoutBtn.disabled = false;
          }
        }
        break;
      case 'game_crashed':
        roundState.status = 'crashed';
        roundState.crashPoint = data.multiplier;
        roundState.canBet = false;
        roundState.canCashout = false;
        multiplierEl.textContent = data.multiplier.toFixed(2) + 'x';
        multiplierEl.className = 'multiplier crashed';
        statusText.textContent = `💥 Crashed at ${data.multiplier.toFixed(2)}x`;
        cashoutBtn.disabled = true;
        addHistory(data.multiplier);
        if (roundState.myBetPlaced && !roundState.hasCashedOut) {
          fetchBalance();
          betDisplay.textContent = `❌ Lost ${roundState.myBet.amount} ETB`;
          winDisplay.textContent = '';
          roundState.myBetPlaced = false;
        }
        setTimeout(() => {
          if (roundState.status === 'crashed') {
            roundState.status = 'waiting';
            roundState.canBet = true;
            statusText.textContent = 'Waiting for next round...';
            multiplierEl.className = 'multiplier';
            updateUI();
          }
        }, 3000);
        break;
      case 'bet_placed':
        roundState.myBetPlaced = true;
        roundState.myBet = { amount: data.amount };
        currentBalance = data.balance;
        document.getElementById('balanceDisplay').textContent = `💰 ${currentBalance.toFixed(2)} ETB`;
        betDisplay.textContent = `💰 Bet: ${data.amount.toFixed(2)} ETB`;
        winDisplay.textContent = '';
        betBtn.disabled = true;
        if (roundState.status === 'flying') {
          roundState.canCashout = true;
          cashoutBtn.disabled = false;
        }
        updateUI();
        break;
      case 'cash_out_success':
        roundState.hasCashedOut = true;
        roundState.canCashout = false;
        currentBalance = data.balance;
        document.getElementById('balanceDisplay').textContent = `💰 ${currentBalance.toFixed(2)} ETB`;
        winDisplay.textContent = `🎉 Won ${data.winAmount.toFixed(2)} ETB at ${data.multiplier.toFixed(2)}x`;
        winDisplay.className = 'win-amount profit-badge';
        betDisplay.textContent = `💰 Bet: ${roundState.myBet.amount.toFixed(2)} ETB`;
        cashoutBtn.disabled = true;
        betBtn.disabled = true;
        updateUI();
        break;
      case 'error':
        console.error('Server error:', data.message);
        alert('⚠️ ' + data.message);
        fetchBalance();
        updateUI();
        break;
      default:
        console.log('Unknown message:', data.type);
    }
  }

  function setConnectionStatus(state, text) {
    connectionStatus.textContent = text;
    connectionStatus.className = 'connection-status ' + state;
  }

  function addHistory(crashPoint) {
    history.unshift(crashPoint);
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historyContainer.innerHTML = '<span style="color:#4a5e7a;width:100%;font-size:11px;">No history yet</span>';
      return;
    }
    let html = '';
    history.forEach(p => {
      let cls = 'crash-point';
      if (p < 2) cls += ' low';
      else if (p < 10) cls += ' medium';
      else cls += ' high';
      html += `<span class="${cls}">${p.toFixed(2)}x</span>`;
    });
    historyContainer.innerHTML = html;
  }

  function updateUI() {
    const token = getToken();
    if (!token || !isConnected) {
      betBtn.disabled = true;
      cashoutBtn.disabled = true;
      return;
    }
    if (roundState.status === 'waiting') {
      betBtn.disabled = false;
      cashoutBtn.disabled = true;
      statusText.textContent = '⏳ Waiting for next round...';
    } else if (roundState.status === 'flying') {
      betBtn.disabled = roundState.myBetPlaced;
      cashoutBtn.disabled = !(roundState.myBetPlaced && !roundState.hasCashedOut);
      statusText.textContent = `✈️ Flying at ${roundState.multiplier.toFixed(2)}x`;
    } else if (roundState.status === 'crashed') {
      betBtn.disabled = true;
      cashoutBtn.disabled = true;
    }
  }

  // ===== ACTIONS =====
  function placeBet() {
    if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
      alert('Not connected to server.');
      return;
    }
    if (roundState.status !== 'flying' && roundState.status !== 'waiting') {
      alert('Round not active.');
      return;
    }
    if (roundState.myBetPlaced) {
      alert('Bet already placed.');
      return;
    }

    const amount = parseFloat(betInput.value);
    if (!amount || amount <= 0) {
      alert('Enter a valid bet amount.');
      return;
    }
    if (amount > currentBalance) {
      alert(`Insufficient balance! You have ${currentBalance.toFixed(2)} ETB.`);
      return;
    }

    ws.send(JSON.stringify({ type: 'place_bet', amount }));
  }

  function cashOut() {
    if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
      alert('Not connected.');
      return;
    }
    if (!roundState.myBetPlaced || roundState.hasCashedOut) {
      alert('No active bet to cash out.');
      return;
    }
    if (roundState.status !== 'flying') {
      alert('Round is not flying.');
      return;
    }

    ws.send(JSON.stringify({ type: 'cash_out' }));
  }

  // ============================================================
  // ========== INIT ==========
  // ============================================================
  (async function init() {
    const token = getToken();
    if (!token) {
      setConnectionStatus('disconnected', '⚠️ Please login first');
      betBtn.disabled = true;
      cashoutBtn.disabled = true;
      return;
    }

    await fetchBalance();
    connectWebSocket();

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && !isConnected) connectWebSocket();
    });

    setInterval(fetchBalance, 15000);
  })();

  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }

  console.log('✈️ Aviator loaded');
</script>
</body>
  </html>
