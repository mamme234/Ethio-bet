<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Keno - Ethiobet</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#0b0e14; color:#fff; min-height:100vh; display:flex; justify-content:center; padding:0; margin:0; overflow-x:hidden; }
    .app { max-width:480px; width:100%; background:#0b0e14; padding:12px 16px 20px; min-height:100vh; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:12px; }
    .header .back { background:none; border:none; color:#6a7e9c; font-size:14px; cursor:pointer; }
    .header .balance { color:#ffd966; font-weight:700; background:rgba(240,185,11,0.12); padding:2px 12px; border-radius:40px; border:1px solid rgba(240,185,11,0.2); font-size:13px; }
    .board { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; margin:12px 0; }
    .cell { background:#1a1f2b; border:1px solid #2a3546; border-radius:4px; padding:6px 0; text-align:center; font-size:14px; font-weight:600; cursor:pointer; transition:0.15s; }
    .cell.selected { background:#f0b90b; color:#0b0e14; border-color:#f0b90b; }
    .cell.hit { background:#2a8c5a; color:#fff; border-color:#2a8c5a; }
    .cell.miss { background:#8c2a2a; color:#fff; border-color:#8c2a2a; }
    .controls { display:flex; gap:8px; margin:8px 0; flex-wrap:wrap; }
    .controls button { padding:8px 16px; border:none; border-radius:40px; font-weight:700; cursor:pointer; transition:0.15s; flex:1; }
    .controls button:active { transform:scale(0.95); }
    .btn-draw { background:linear-gradient(135deg,#f0b90b,#d99f0a); color:#0b0e14; }
    .btn-reset { background:#2a3546; color:#fff; }
    .result { margin-top:8px; font-weight:700; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back" onclick="history.back()">← Back</button>
    <span class="balance" id="balanceDisplay">💰 0.00 ETB</span>
  </div>
  <div style="font-size:18px;font-weight:700;">🎯 Keno</div>
  <div class="board" id="kenoBoard"></div>
  <div class="controls">
    <button class="btn-draw" onclick="draw()">Draw</button>
    <button class="btn-reset" onclick="reset()">Reset</button>
  </div>
  <div class="result" id="kenoResult">Pick numbers (1-40) then Draw</div>
</div>
<script>
  const BACKEND_URL = (() => {
    const host = window.location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return 'http://localhost:8080';
    return 'https://ethio-bet-1.onrender.com';
  })();

  function getToken() { return localStorage.getItem('token'); }
  let balance = 0;
  let selected = new Set();
  const totalNums = 40;
  const drawCount = 10;

  async function fetchBalance() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${BACKEND_URL}/api/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        balance = data.balance;
        document.getElementById('balanceDisplay').textContent = `💰 ${balance.toFixed(2)} ETB`;
      }
    } catch (e) {}
  }

  function renderBoard() {
    const board = document.getElementById('kenoBoard');
    board.innerHTML = '';
    for (let i=1; i<=totalNums; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (selected.has(i)) cell.classList.add('selected');
      cell.textContent = i;
      cell.dataset.num = i;
      cell.onclick = () => toggle(i);
      board.appendChild(cell);
    }
  }

  function toggle(num) {
    if (selected.has(num)) selected.delete(num);
    else if (selected.size < 10) selected.add(num);
    renderBoard();
  }

  function reset() {
    selected.clear();
    document.getElementById('kenoResult').textContent = 'Pick numbers (1-40) then Draw';
    renderBoard();
  }

  function draw() {
    if (selected.size < 1) { alert('Select at least 1 number'); return; }
    const allNums = Array.from({length:totalNums}, (_,i) => i+1);
    const shuffled = allNums.sort(() => Math.random() - 0.5);
    const drawn = shuffled.slice(0, drawCount);
    const hits = [...selected].filter(n => drawn.includes(n));
    const win = hits.length * 2; // dummy payout
    // Show result
    const board = document.getElementById('kenoBoard');
    board.querySelectorAll('.cell').forEach(cell => {
      const num = parseInt(cell.dataset.num);
      if (drawn.includes(num)) {
        cell.classList.add('hit');
      } else if (selected.has(num)) {
        cell.classList.add('miss');
      }
    });
    document.getElementById('kenoResult').textContent = `🎉 ${hits.length} hits! Win ${win} ETB`;
    // Update balance (in real app, call backend)
    balance += win;
    document.getElementById('balanceDisplay').textContent = `💰 ${balance.toFixed(2)} ETB`;
    // Disable selection after draw? We'll allow reset.
  }

  fetchBalance();
  renderBoard();
</script>
</body>
</html>
