<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Admin - Ethiobet</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
    body { background:#0b0e14; color:#fff; min-height:100vh; display:flex; justify-content:center; padding:0; margin:0; overflow-x:hidden; }
    .app { max-width:480px; width:100%; background:#0b0e14; padding:12px 16px 20px; min-height:100vh; }
    .header { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:12px; }
    .header .back { background:none; border:none; color:#6a7e9c; font-size:14px; cursor:pointer; }
    .header .balance { color:#ffd966; font-weight:700; background:rgba(240,185,11,0.12); padding:2px 12px; border-radius:40px; border:1px solid rgba(240,185,11,0.2); font-size:13px; }
    .admin-panel h2 { color:#f0b90b; font-size:16px; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .deposit-card { background:#1a1f2b; border-radius:10px; padding:10px 12px; margin-bottom:8px; border:1px solid #2a3546; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
    .deposit-card .amount { color:#ffd966; font-weight:700; }
    .deposit-card .user { color:#889bb5; font-size:12px; }
    .deposit-card .actions button { padding:4px 14px; border:none; border-radius:40px; font-weight:700; font-size:11px; cursor:pointer; transition:0.15s; }
    .deposit-card .actions button:active { transform:scale(0.95); }
    .btn-approve { background:#2a8c5a; color:#fff; }
    .btn-reject { background:#8c2a2a; color:#fff; }
    .empty { color:#6a7e9c; text-align:center; padding:20px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back" onclick="history.back()">← Back</button>
    <span class="balance" id="balanceDisplay">💰 0.00 ETB</span>
  </div>
  <div class="admin-panel">
    <h2>🔑 Admin Panel <span id="pendingCount" style="font-size:12px;color:#6a7e9c;">0 pending</span></h2>
    <div id="adminDepositList"><div class="empty">No pending deposits</div></div>
  </div>
</div>
<script>
  const BACKEND_URL = (() => {
    const host = window.location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return 'http://localhost:8080';
    return 'https://ethio-bet-1.onrender.com';
  })();
  const ADMIN_IDS = [7154361039];

  function getToken() { return localStorage.getItem('token'); }
  let currentUser = null;

  async function fetchProfile() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${BACKEND_URL}/api/profile`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        currentUser = data;
        document.getElementById('balanceDisplay').textContent = `💰 ${data.balance.toFixed(2)} ETB`;
        if (ADMIN_IDS.includes(data.id)) loadPendingDeposits();
        else document.getElementById('adminDepositList').innerHTML = '<div class="empty">⛔ You are not an admin</div>';
      }
    } catch (e) { console.error(e); }
  }

  async function loadPendingDeposits() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(`${BACKEND_URL}/api/pending`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Unauthorized');
      const deposits = await res.json();
      document.getElementById('pendingCount').textContent = deposits.length + ' pending';
      const container = document.getElementById('adminDepositList');
      if (!deposits.length) {
        container.innerHTML = '<div class="empty">✅ No pending deposits</div>';
        return;
      }
      container.innerHTML = deposits.map(d => `
        <div class="deposit-card" id="dep-${d.id}">
          <div>
            <div class="amount">💰 ${d.amount} ETB</div>
            <div class="user">👤 ${d.telegramId}</div>
          </div>
          <div class="actions">
            <button class="btn-approve" onclick="verifyDeposit('${d.id}','approve')">✅ Approve</button>
            <button class="btn-reject" onclick="verifyDeposit('${d.id}','reject')">❌ Reject</button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('adminDepositList').innerHTML = '<div class="empty">⚠️ Error loading</div>';
    }
  }

  async function verifyDeposit(depositId, action) {
    if (!confirm(`Are you sure you want to ${action} this deposit?`)) return;
    const token = getToken();
    if (!token) return;
    const card = document.getElementById(`dep-${depositId}`);
    const btns = card.querySelectorAll('button');
    btns.forEach(b => b.disabled = true);
    try {
      const res = await fetch(`${BACKEND_URL}/api/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ adminId: currentUser.id, depositId, action })
      });
      if (res.ok) {
        card.style.opacity = '0.3';
        card.style.background = action === 'approve' ? '#1f3a2f' : '#3a1f1f';
        setTimeout(loadPendingDeposits, 1000);
        if (currentUser) { currentUser.balance = (await res.json()).balance || currentUser.balance; }
        fetchProfile();
      }
    } catch (err) { alert('Error'); btns.forEach(b => b.disabled = false); }
  }

  fetchProfile();
</script>
</body>
</html>
