<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✈️ Ethiobet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }
    .app {
      max-width: 480px;
      width: 100%;
      background: rgba(19, 26, 34, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
    }
    .app::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 10%, rgba(240, 185, 11, 0.05), transparent 60%);
      pointer-events: none;
    }
    /* Profile */
    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 14px;
    }
    .profile img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #f0b90b;
      object-fit: cover;
      background: #1f2a37;
    }
    .profile .info { flex: 1; }
    .profile .name { color: #fff; font-size: 16px; font-weight: 700; }
    .profile .username { color: #889bb5; font-size: 12px; }
    .profile .balance {
      color: #ffd966;
      font-size: 18px;
      font-weight: 700;
      background: rgba(240, 185, 11, 0.12);
      padding: 4px 14px;
      border-radius: 40px;
      border: 1px solid rgba(240, 185, 11, 0.2);
    }
    /* Admin Badge */
    .admin-badge {
      background: #f0b90b;
      color: #0b0e14;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 40px;
      display: inline-block;
      margin-top: 2px;
      text-transform: uppercase;
    }
    /* Multiplier */
    .multiplier {
      text-align: center;
      font-size: 44px;
      font-weight: 800;
      color: #fff;
      padding: 6px 0 2px;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      margin-bottom: 10px;
    }
    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0f161e;
      border-radius: 16px;
      display: block;
      margin: 6px 0 10px;
      border: 1px solid #25303e;
    }
    .status {
      text-align: center;
      font-weight: 600;
      font-size: 13px;
      min-height: 22px;
      color: #6a7e9c;
      margin-bottom: 10px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .controls input {
      flex: 2;
      min-width: 80px;
      background: #1b2532;
      border: 1px solid #2f3e51;
      border-radius: 40px;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      outline: none;
    }
    .controls input:focus { border-color: #f0b90b; }
    .controls button {
      flex: 1;
      min-width: 80px;
      border: none;
      border-radius: 40px;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    #betBtn {
      background: linear-gradient(135deg, #f0b90b, #d99f0a);
      color: #0b0e14;
      box-shadow: 0 4px 16px rgba(240, 185, 11, 0.3);
    }
    #betBtn:hover:not(:disabled) { transform: scale(1.02); }
    #cashoutBtn {
      background: linear-gradient(135deg, #2a8c5a, #1f6e46);
      color: #fff;
      box-shadow: 0 4px 16px rgba(42, 140, 90, 0.3);
    }
    #cashoutBtn:hover:not(:disabled) { transform: scale(1.02); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    /* Deposit */
    .deposit-section {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 6px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .deposit-section input {
      flex: 1;
      min-width: 70px;
      background: #0f161e;
      border: 1px solid #2f3e51;
      border-radius: 40px;
      padding: 8px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .deposit-section input:focus { border-color: #f0b90b; }
    .deposit-section button {
      background: linear-gradient(135deg, #2a8c5a, #1f6e46);
      border: none;
      border-radius: 40px;
      padding: 8px 18px;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 12px rgba(42, 140, 90, 0.2);
    }
    .deposit-section button:hover { transform: scale(1.02); }
    #depositStatus { color: #889bb5; font-size: 12px; width: 100%; margin-top: 4px; text-align: center; }
    /* History */
    .history {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      min-height: 30px;
    }
    .history-label { color: #6a7e9c; font-size: 11px; font-weight: 600; margin-right: 4px; }
    .badge {
      background: #1f2a37;
      color: #b0c8e5;
      padding: 3px 12px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .badge.high { background: #1f3a2f; color: #6fcf97; }
    .badge.low { background: #3a1f1f; color: #f28b82; }
    .footer {
      color: #4a5e7a;
      font-size: 10px;
      text-align: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    /* Admin Panel */
    .admin-panel {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px solid rgba(240, 185, 11, 0.2);
      display: none;
    }
    .admin-panel.active { display: block; }
    .admin-panel h2 {
      color: #f0b90b;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .admin-panel h2 span {
      background: #f0b90b;
      color: #0b0e14;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 40px;
    }
    .deposit-card {
      background: #1a1f2b;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid #2a3546;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .deposit-card .info .amount { color: #ffd966; font-weight: 700; font-size: 16px; }
    .deposit-card .info .user { color: #889bb5; font-size: 12px; }
    .deposit-card .info .time { color: #6a7e9c; font-size: 10px; }
    .deposit-card .actions { display: flex; gap: 6px; }
    .deposit-card .actions button {
      padding: 6px 16px;
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-approve { background: #2a8c5a; color: #fff; }
    .btn-approve:hover { background: #36b06e; }
    .btn-reject { background: #8c2a2a; color: #fff; }
    .btn-reject:hover { background: #b03636; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-deposits { color: #6a7e9c; text-align: center; padding: 16px; font-size: 13px; }
    .merchant-info {
      background: rgba(240, 185, 11, 0.06);
      border: 1px solid rgba(240, 185, 11, 0.1);
      border-radius: 10px;
      padding: 8px 12px;
      margin-top: 6px;
      font-size: 12px;
      color: #889bb5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .merchant-info strong { color: #ffd966; }
  </style>
</head>
<body>

<div class="app">
  <!-- Profile -->
  <div class="profile">
    <img id="avatar" src="" alt="avatar">
    <div class="info">
      <div class="name" id="userName">Loading...</div>
      <div class="username" id="userTag">@username</div>
      <div id="adminBadgeContainer"></div>
    </div>
    <div class="balance" id="balanceDisplay">0</div>
  </div>

  <!-- Merchant Info -->
  <div class="merchant-info">
    <span>🏦 Send Telebirr to:</span>
    <strong id="merchantPhone">0912345678</strong>
  </div>

  <!-- Multiplier -->
  <div class="multiplier" id="multiplierDisplay">1.00x</div>

  <!-- Canvas -->
  <canvas id="gameCanvas" width="800" height="450"></canvas>

  <div class="status" id="statusMsg">⏳ Connecting...</div>

  <!-- Controls -->
  <div class="controls">
    <input type="number" id="betInput" value="10" step="1" min="1">
    <button id="betBtn">🚀 Bet</button>
    <button id="cashoutBtn" disabled>💰 Cash Out</button>
  </div>

  <!-- Deposit -->
  <div class="deposit-section">
    <input type="number" id="depositAmount" placeholder="Amount (ETB)" value="50" min="1">
    <button id="depositBtn">💳 Request Deposit</button>
    <div id="depositStatus"></div>
  </div>

  <!-- History -->
  <div class="history">
    <span class="history-label">📊 History:</span>
    <div id="historyContainer"></div>
  </div>

  <!-- ADMIN PANEL (hidden by default) -->
  <div class="admin-panel" id="adminPanel">
    <h2>🔑 Admin Panel <span id="pendingCount">0 pending</span></h2>
    <div id="adminDepositList">
      <div class="empty-deposits">No pending deposits</div>
    </div>
  </div>

  <div class="footer">⚡ @Ethiobet1_bot · Telebirr Deposits</div>
</div>

<script>
  // ---------- TELEGRAM WEBAPP ----------
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe?.user;
  const userId = user?.id || 'guest_' + Date.now();
  const firstName = user?.first_name || 'Guest';
  const lastName = user?.last_name || '';
  const username = user?.username || '';
  const photoUrl = user?.photo_url || '';

  // ---------- CONFIG ----------
  const MERCHANT_PHONE = '0912345678';
  const ADMIN_IDS = [123456789]; // Replace with your Telegram ID

  const isAdmin = ADMIN_IDS.includes(parseInt(userId));

  // ---------- DOM REFS ----------
  const avatar = document.getElementById('avatar');
  const userName = document.getElementById('userName');
  const userTag = document.getElementById('userTag');
  const balanceDisplay = document.getElementById('balanceDisplay');
  const multiplierDisplay = document.getElementById('multiplierDisplay');
  const statusMsg = document.getElementById('statusMsg');
  const betInput = document.getElementById('betInput');
  const betBtn = document.getElementById('betBtn');
  const cashoutBtn = document.getElementById('cashoutBtn');
  const historyContainer = document.getElementById('historyContainer');
  const depositAmount = document.getElementById('depositAmount');
  const depositBtn = document.getElementById('depositBtn');
  const depositStatus = document.getElementById('depositStatus');
  const merchantPhone = document.getElementById('merchantPhone');
  const adminPanel = document.getElementById('adminPanel');
  const adminDepositList = document.getElementById('adminDepositList');
  const pendingCount = document.getElementById('pendingCount');
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // ---------- PROFILE ----------
  userName.textContent = firstName + (lastName ? ' ' + lastName : '');
  userTag.textContent = username ? '@' + username : 'User';
  merchantPhone.textContent = MERCHANT_PHONE;

  if (photoUrl) {
    avatar.src = photoUrl;
  } else {
    const initial = firstName.charAt(0).toUpperCase();
    const c = document.createElement('canvas');
    c.width = 100; c.height = 100;
    const cx = c.getContext('2d');
    cx.fillStyle = '#f0b90b';
    cx.arc(50, 50, 50, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#0b0e14';
    cx.font = 'bold 44px sans-serif';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText(initial, 50, 52);
    avatar.src = c.toDataURL();
  }

  // Show admin badge if admin
  if (isAdmin) {
    document.getElementById('adminBadgeContainer').innerHTML = 
      '<span class="admin-badge">🔑 Admin</span>';
    adminPanel.classList.add('active');
  }

  // ---------- WEBSOCKET ----------
  const ws = new WebSocket(`wss://${window.location.host}/?userId=${userId}`);
  let balance = 0;
  let multiplier = 1.00;
  let gameStatus = 'waiting';
  let hasBet = false;
  const history = [];

  // ---------- CANVAS DRAW ----------
  function drawCanvas(currentMultiplier, crashed, crashValue) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = '#1e2a38';
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 10; i++) {
      const y = h - (i / 10) * h * 0.85 - 20;
      ctx.beginPath();
      ctx.moveTo(40, y);
      ctx.lineTo(w - 20, y);
      ctx.stroke();
      ctx.fillStyle = '#3e526a';
      ctx.font = '10px monospace';
      ctx.fillText((i * 5).toString() + 'x', 6, y + 4);
    }
    const maxX = w - 30;
    const baseY = h - 20;
    const scaleX = maxX / 8;
    const scaleY = (h - 40) / 12;
    ctx.beginPath();
    ctx.strokeStyle = '#f0b90b';
    ctx.lineWidth = 4.5;
    ctx.shadowColor = '#f0b90b';
    ctx.shadowBlur = 15;
    const points = 60;
    let displayMultiplier = currentMultiplier;
    if (crashed) displayMultiplier = crashValue || 1.00;
    for (let i = 0; i <= points; i++) {
      const t = (i / points) * 8;
      let m = 1.00 + t * 1.2;
      if (crashed && crashValue) {
        const crashT = (crashValue - 1) / 1.2;
        if (t > crashT) m = crashValue;
        else m = 1 + t * 1.2;
      } else {
        if (t * 1.2 > displayMultiplier - 1) m = displayMultiplier;
        else m = 1 + t * 1.2;
      }
      const x = 40 + t * scaleX;
      const y = baseY - (m - 1) * scaleY;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    const currentT = (displayMultiplier - 1) / 1.2;
    const planeX = 40 + Math.min(currentT, 8) * scaleX;
    const planeY = baseY - (displayMultiplier - 1) * scaleY;
    ctx.beginPath();
    ctx.fillStyle = '#ffd966';
    ctx.shadowBlur = 25;
    ctx.shadowColor = '#ffd966';
    ctx.moveTo(planeX + 20, planeY - 6);
    ctx.lineTo(planeX + 30, planeY);
    ctx.lineTo(planeX + 20, planeY + 6);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    if (crashed) {
      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 36px sans-serif';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 30;
      ctx.fillText('💥 CRASHED', w/2 - 130, 90);
      ctx.shadowBlur = 0;
    }
  }

  // ---------- WEBSOCKET EVENTS ----------
  ws.onopen = () => { statusMsg.textContent = '✅ Connected!'; };
  ws.onclose = () => { 
    statusMsg.textContent = '❌ Disconnected. Reconnecting...'; 
    setTimeout(() => location.reload(), 3000); 
  };
  ws.onerror = () => { statusMsg.textContent = '⚠️ Connection error'; };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    console.log('WS:', data);

    switch(data.type) {
      case 'init':
        balance = data.balance;
        updateUI();
        break;
      case 'round_started':
        gameStatus = 'flying';
        statusMsg.textContent = '✈️ Flying! Cash out!';
        betBtn.disabled = true;
        if (!hasBet) betBtn.disabled = false;
        break;
      case 'multiplier_update':
        multiplier = data.multiplier;
        multiplierDisplay.textContent = multiplier.toFixed(2) + 'x';
        if (gameStatus !== 'crashed') drawCanvas(multiplier, false, 0);
        break;
      case 'game_crashed':
        gameStatus = 'crashed';
        multiplier = data.multiplier;
        multiplierDisplay.textContent = multiplier.toFixed(2) + 'x';
        drawCanvas(multiplier, true, multiplier);
        statusMsg.textContent = '💥 Crashed!';
        betBtn.disabled = false;
        cashoutBtn.disabled = true;
        hasBet = false;
        history.unshift(multiplier);
        if (history.length > 15) history.pop();
        renderHistory();
        break;
      case 'bet_placed':
        hasBet = true;
        balance = data.balance;
        betBtn.disabled = true;
        cashoutBtn.disabled = false;
        statusMsg.textContent = '⏳ Bet placed!';
        updateUI();
        break;
      case 'cash_out_success':
        hasBet = false;
        balance = data.balance;
        cashoutBtn.disabled = true;
        betBtn.disabled = false;
        statusMsg.textContent = `✅ Cashed out at ${data.multiplier.toFixed(2)}x! Won ${data.winAmount.toFixed(2)} ETB!`;
        updateUI();
        drawCanvas(data.multiplier, false, 0);
        break;
      case 'user_cashed_out':
        statusMsg.textContent = `👤 User cashed out at ${data.multiplier.toFixed(2)}x!`;
        break;
      case 'error':
        statusMsg.textContent = '⚠️ ' + data.message;
        if (data.message.includes('balance')) betBtn.disabled = false;
        break;
    }
  };

  function updateUI() {
    balanceDisplay.textContent = balance.toFixed(0);
  }

  function renderHistory() {
    historyContainer.innerHTML = '';
    history.forEach(v => {
      const badge = document.createElement('span');
      badge.className = 'badge' + (v >= 5 ? ' high' : v <= 1.5 ? ' low' : '');
      badge.textContent = v.toFixed(2) + 'x';
      historyContainer.appendChild(badge);
    });
  }

  // ---------- BET & CASHOUT ----------
  betBtn.onclick = () => {
    const amount = parseFloat(betInput.value);
    if (!amount || amount <= 0) return alert('Enter valid bet');
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'place_bet', amount }));
    }
  };

  cashoutBtn.onclick = () => {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'cash_out' }));
    }
  };

  // ---------- DEPOSIT (Mini App) ----------
  depositBtn.onclick = () => {
    const amount = parseFloat(depositAmount.value);
    if (!amount || amount < 1) {
      depositStatus.textContent = '⚠️ Enter valid amount';
      return;
    }
    depositStatus.textContent = '📸 Send screenshot to bot...';
    depositBtn.disabled = true;
    
    // Open Telegram bot chat with instructions
    tg.openTelegramLink(`https://t.me/@Ethiobet1_bot`);
    
    setTimeout(() => {
      depositStatus.textContent = '📤 After payment, send screenshot to bot';
      depositBtn.disabled = false;
    }, 3000);
  };

  // ---------- ADMIN PANEL ----------
  if (isAdmin) {
    function loadPendingDeposits() {
      fetch(`/api/pending?adminId=${userId}`)
        .then(res => {
          if (res.status === 403) {
            adminDepositList.innerHTML = '<div class="empty-deposits">⛔ Unauthorized</div>';
            return null;
          }
          return res.json();
        })
        .then(deposits => {
          if (!deposits) return;
          pendingCount.textContent = deposits.length + ' pending';
          
          if (deposits.length === 0) {
            adminDepositList.innerHTML = '<div class="empty-deposits">✅ No pending deposits</div>';
            return;
          }
          
          adminDepositList.innerHTML = deposits.map(d => `
            <div class="deposit-card" id="dep-${d.id}">
              <div class="info">
                <div class="amount">💰 ${d.amount} ETB</div>
                <div class="user">👤 ${d.telegramId}</div>
                <div class="time">🆔 ${d.id}</div>
              </div>
              <div class="actions">
                <button class="btn-approve" onclick="verifyDeposit('${d.id}', 'approve')">✅ Approve</button>
                <button class="btn-reject" onclick="verifyDeposit('${d.id}', 'reject')">❌ Reject</button>
              </div>
            </div>
          `).join('');
        })
        .catch(err => {
          adminDepositList.innerHTML = '<div class="empty-deposits">⚠️ Error loading</div>';
        });
    }

    window.verifyDeposit = function(depositId, action) {
      if (!confirm(`Are you sure you want to ${action} this deposit?`)) return;
      
      const card = document.getElementById(`dep-${depositId}`);
      const buttons = card.querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);
      
      fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ adminId: userId, depositId, action })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          card.style.opacity = '0.3';
          card.style.background = action === 'approve' ? '#1f3a2f' : '#3a1f1f';
          setTimeout(loadPendingDeposits, 1000);
        }
      })
      .catch(err => {
        alert('Error: ' + err.message);
        buttons.forEach(b => b.disabled = false);
      });
    };

    loadPendingDeposits();
    setInterval(loadPendingDeposits, 10000);
  }

  // ---------- KEYBOARD SHORTCUTS ----------
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !betBtn.disabled) {
      e.preventDefault();
      betBtn.click();
    }
    if ((e.key === ' ' || e.key === 'Space') && !cashoutBtn.disabled) {
      e.preventDefault();
      cashoutBtn.click();
    }
  });

  // ---------- INIT ----------
  drawCanvas(1.00, false, 0);
</script>
</body>
    </html>
